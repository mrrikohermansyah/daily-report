<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#007bff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Daily Report" />
    <title>Login - Daily Report</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="logo-180.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="logo-192.png" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>

  <body>
    <div class="container">
      <div
        style="position: absolute; top: 20px; right: 20px; z-index: 100"
        class="header-button-stack"
      >
        <button class="theme-toggle" id="themeToggle" title="Switch Theme">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
        <button
          class="theme-toggle"
          id="refreshPageHeader"
          title="Refresh Page"
          style="display: none"
        >
          <i class="fas fa-sync-alt"></i>
        </button>
      </div>
      <main class="login-grid">
        <div class="login-left">
          <h1 class="login-brand-large">DailyReport</h1>
          <div class="login-subtitle">
            Record your daily activities efficiently.
            <br />Don't get <span style="color: var(--danger)">PECAT!</span>.
          </div>
        </div>
        <div class="login-right">
          <div class="login-card">
            <form class="form" id="loginForm">
              <div class="form-group">
                <input
                  type="text"
                  id="loginName"
                  placeholder="Your Name"
                  class="form-control btn-lg"
                  style="font-size: 16px; display: none"
                />
              </div>
              <div class="form-group">
                <input
                  type="email"
                  id="loginEmail"
                  placeholder="Email or Phone Number"
                  class="form-control btn-lg"
                  style="font-size: 16px"
                />
              </div>
              <div class="form-group">
                <input
                  type="password"
                  id="loginPassword"
                  placeholder="Password"
                  class="form-control btn-lg"
                  style="font-size: 16px"
                />
              </div>
              <div class="actions">
                <button
                  type="submit"
                  class="btn-primary btn-block btn-lg"
                  id="btn_login"
                >
                  Log In
                </button>
              </div>
              <div class="divider"></div>
              <div style="margin-bottom: 12px">
                <a href="#" class="link-reset" id="btn_reset"
                  >Forgot Password?</a
                >
              </div>
              <div class="signup-actions-row">
                <button
                  type="button"
                  class="btn-success btn-lg create-account-btn"
                  id="btn_signup"
                >
                  Create New Account
                </button>
                <button
                  type="button"
                  class="btn-secondary btn-sm btn-cancel-signup"
                  id="btn_cancel_signup"
                >
                  &times;
                </button>
              </div>
              <div
                style="margin-top: 10px; text-align: center"
                class="muted"
                id="auth_status"
              ></div>
            </form>
            <div style="margin-top: 10px">
              <button
                type="button"
                class="btn-google btn-lg"
                id="btn_login_google"
              >
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 18 18"
                  xmlns="http://www.w3.org/2000/svg"
                  style="margin-right: 12px"
                >
                  <path
                    d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
                    fill="#4285F4"
                  />
                  <path
                    d="M9 18c2.43 0 4.467-.806 5.956-2.184L12.048 13.56c-.806.54-1.836.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"
                    fill="#34A853"
                  />
                  <path
                    d="M3.964 10.708c-.18-.54-.282-1.117-.282-1.708 0-.591.102-1.169.282-1.708V4.96H.957A8.992 8.992 0 000 9c0 1.452.348 2.827.957 4.041l3.007-2.333z"
                    fill="#FBBC05"
                  />
                  <path
                    d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.443 2.047.957 4.96L3.964 7.292C4.672 5.165 6.656 3.58 9 3.58z"
                    fill="#EA4335"
                  />
                </svg>
                Continue with Google
              </button>
            </div>
          </div>
          <div style="margin-top: 24px; font-size: 14px; text-align: center">
            <strong>Create a Page</strong> for a employees.
          </div>
        </div>
      </main>
    </div>

    <div id="version-container" class="version-container"></div>
    <script src="app.js"></script>
    <script>
      // Redirect ke index setelah login diproses oleh app.js
      // app.js sudah punya onAuthStateChanged; kita hanya pastikan link logout tidak tampil di halaman login
    </script>
    <script>
      (function () {
        try {
          fetch("version.html")
            .then((r) => r.text())
            .then((html) => {
              const container = document.getElementById("version-container");
              if (container) container.innerHTML = html;
            })
            .catch(() => {});
        } catch {}
      })();
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("./sw.js")
            .then((registration) => {
              console.log(
                "ServiceWorker registration successful with scope: ",
                registration.scope,
              );
            })
            .catch((err) => {
              console.log("ServiceWorker registration failed: ", err);
            });
        });
      }
    </script>
  </body>
</html>
